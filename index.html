<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NarraVox Hub | Paulo Henrik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37; /* Dourado Real */
            --secondary: #aa8418;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(212, 175, 55, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #1a1500 0%, #050505 100%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
            text-align: center;
        }

        .profile-pic {
            width: 280px;
            height: auto;
            max-height: 180px;
            border-radius: 12px;
            margin-bottom: 5px;
            object-fit: contain;
            background: transparent;
            padding: 5px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .bio {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .link-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
        }

        .link-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.15);
            background: rgba(212, 175, 55, 0.05);
            color: var(--primary);
        }

        .link-card span { font-size: 1.2rem; }

        .nexus { 
            background: linear-gradient(45deg, rgba(212, 175, 55, 0.1), transparent);
            border-color: var(--primary);
        }

        footer {
            margin-top: 60px;
            font-size: 0.65rem;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
